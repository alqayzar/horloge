<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta id="themeColor" name="theme-color" content="#f1f5f9" />
  <title>Lire l'heure</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <style>
    /* CSS variables pour l'horloge SVG */
    :root {
      --clock-face:   #f8fafc;
      --clock-stroke: #e2e8f0;
      --clock-mark-h: #94a3b8;
      --clock-mark-m: #cbd5e1;
      --clock-num:    #334155;
      --clock-hand-h: #1e293b;
      --clock-hand-m: #64748b;
      --clock-center: #1e293b;
    }
    .dark {
      --clock-face:   #1e293b;
      --clock-stroke: #334155;
      --clock-mark-h: #64748b;
      --clock-mark-m: #374151;
      --clock-num:    #94a3b8;
      --clock-hand-h: #f1f5f9;
      --clock-hand-m: #94a3b8;
      --clock-center: #f1f5f9;
    }

    /* Supprime les spinners des inputs number */
    input[type=number]::-webkit-outer-spin-button,
    input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; appearance: textfield; }

    /* Supprime le flash de tap sur iOS */
    button, label { -webkit-tap-highlight-color: transparent; }

    /* Safe area iPhone (encoche + barre home) */
    body {
      padding-bottom: max(0.75rem, env(safe-area-inset-bottom));
      padding-left:   env(safe-area-inset-left);
      padding-right:  env(safe-area-inset-right);
    }

    /* Toggle switch */
    #toggleTrack              { background-color: #e2e8f0; }
    .dark #toggleTrack        { background-color: #4b5563; }
    #toggleTrack.tog-on       { background-color: #3b82f6 !important; }

    /* Affichage saisie */
    .disp-field {
      width: 4.5rem; height: 3.25rem;
      display: flex; align-items: center; justify-content: center;
      border-radius: 0.75rem; border: 2px solid #e2e8f0;
      background: white; cursor: pointer;
      transition: border-color 0.15s; user-select: none;
      font-size: 1.625rem; font-weight: 700;
    }
    .dark .disp-field  { border-color: #475569; background: #334155; color: #f1f5f9; }
    .disp-field.disp-active { border-color: #3b82f6; }
    .disp-val          { color: #94a3b8; }
    .dark .disp-val    { color: #475569; }
    .disp-val.has-val  { color: #1e293b; }
    .dark .disp-val.has-val { color: #f1f5f9; }

    /* Pavé numérique */
    .numpad-key {
      padding: 0.55rem 0; border-radius: 0.65rem; border: none;
      font-size: 1.25rem; font-weight: 700; cursor: pointer;
      user-select: none; transition: background-color 0.1s;
      background: #f1f5f9; color: #334155;
    }
    .numpad-key:hover  { background: #e2e8f0; }
    .numpad-key:active { background: #cbd5e1; }
    .dark .numpad-key  { background: #334155; color: #e2e8f0; }
    .dark .numpad-key:hover  { background: #3d5068; }
    .dark .numpad-key:active { background: #475569; }

    /* Bouton continuer/valider du pavé */
    .continue-hours        { background: #eff6ff; color: #3b82f6; }
    .continue-hours:hover  { background: #dbeafe; }
    .continue-hours:active { background: #bfdbfe; }
    .dark .continue-hours        { background: rgba(59,130,246,0.15); color: #60a5fa; }
    .dark .continue-hours:hover  { background: rgba(59,130,246,0.25); }
    .continue-min          { background: #f0fdf4; color: #16a34a; }
    .continue-min:hover    { background: #dcfce7; }
    .continue-min:active   { background: #bbf7d0; }
    .dark .continue-min        { background: rgba(34,197,94,0.15); color: #4ade80; }
    .dark .continue-min:hover  { background: rgba(34,197,94,0.25); }

    /* État verrouillé : seulement les chiffres et backspace sont grisés */
    #numpad.locked .numpad-key,
    #numpad.locked #backspaceBtn { opacity: 0.35; pointer-events: none; }

    /* ContinueBtn en mode "suivant" après validation */
    .continue-next        { background: #10b981; color: white; }
    .continue-next:hover  { background: #059669; }
    .continue-next:active { background: #047857; }
    .dark .continue-next  { background: #059669; }
  </style>
</head>
<body class="bg-slate-100 dark:bg-slate-900 min-h-[100dvh] flex flex-col items-center justify-center p-2 transition-colors duration-200">

  <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-lg p-3 w-full max-w-sm transition-colors duration-200">

    <!-- Header -->
    <div class="flex items-center justify-between mb-2">
      <h1 class="text-base font-bold text-slate-700 dark:text-slate-100">Quelle heure est-il&nbsp;?</h1>
      <div class="flex items-center gap-1">
        <button id="darkBtn" title="Thème"
          class="w-7 h-7 flex items-center justify-center rounded-lg text-base
                 text-slate-400 hover:text-slate-600 dark:text-slate-500 dark:hover:text-slate-300
                 hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors">
          🌙
        </button>
        <button id="settingsBtn" title="Paramètres"
          class="w-7 h-7 flex items-center justify-center rounded-lg text-base
                 text-slate-400 hover:text-slate-600 dark:text-slate-500 dark:hover:text-slate-300
                 hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors">
          ⚙
        </button>
      </div>
    </div>

    <!-- Score + Temps -->
    <div class="bg-slate-50 dark:bg-slate-700/50 rounded-xl px-3 py-1.5 mb-2">
      <div class="flex items-center justify-between gap-2">
        <!-- Score / Meilleur -->
        <div class="text-center flex-1 min-w-0">
          <div class="text-xs font-medium text-slate-400 dark:text-slate-500 uppercase tracking-wide mb-0.5">Score / record</div>
          <div class="text-base font-bold">
            <span id="scoreDisplay" class="text-slate-700 dark:text-slate-100">0</span>
            <span class="text-slate-300 dark:text-slate-600 mx-1">/</span>
            <span id="bestDisplay" class="text-amber-500">0</span>
          </div>
        </div>
        <!-- Séparateur vertical -->
        <div class="w-px self-stretch bg-slate-200 dark:bg-slate-600"></div>
        <!-- Moy. session / record -->
        <div class="text-center flex-1 min-w-0">
          <div class="text-xs font-medium text-slate-400 dark:text-slate-500 uppercase tracking-wide mb-0.5">Moy. / record</div>
          <div class="text-base font-bold">
            <span id="avgDisplay" class="text-slate-400 dark:text-slate-500">—</span>
            <span class="text-slate-300 dark:text-slate-600 mx-1">/</span>
            <span id="bestAvgDisplay" class="text-violet-500">—</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Horloge SVG -->
    <div class="flex justify-center mb-2">
      <svg id="clock" viewBox="0 0 220 220" class="w-full max-w-[175px]">
        <circle cx="110" cy="110" r="105" fill="var(--clock-face)" stroke="var(--clock-stroke)" stroke-width="4"/>
        <g id="clock-marks"></g>
        <line id="hour-hand"   x1="110" y1="110" x2="110" y2="110"
          stroke="var(--clock-hand-h)" stroke-width="7" stroke-linecap="round"/>
        <line id="minute-hand" x1="110" y1="110" x2="110" y2="110"
          stroke="var(--clock-hand-m)" stroke-width="4" stroke-linecap="round"/>
        <rect id="ampm-bg" x="88" y="143" width="44" height="22" rx="11" fill="#e2e8f0"/>
        <text id="ampm-label" x="110" y="154" text-anchor="middle" dominant-baseline="central"
          font-size="12" font-weight="bold" font-family="system-ui, sans-serif" fill="#475569">AM</text>
        <circle cx="110" cy="110" r="5" fill="var(--clock-center)"/>
      </svg>
    </div>

    <!-- Affichage saisie -->
    <div class="flex items-center justify-center gap-2 mb-2">
      <div class="flex flex-col items-center gap-0.5">
        <label class="text-xs font-medium text-slate-500 dark:text-slate-400">Heures (0–23)</label>
        <div id="dispHours" class="disp-field disp-active">
          <span id="dispHoursVal" class="disp-val">--</span>
        </div>
      </div>
      <span class="text-2xl font-bold text-slate-300 dark:text-slate-600 mt-4">:</span>
      <div class="flex flex-col items-center gap-0.5">
        <label class="text-xs font-medium text-slate-500 dark:text-slate-400">Minutes</label>
        <div id="dispMinutes" class="disp-field">
          <span id="dispMinutesVal" class="disp-val">--</span>
        </div>
      </div>
    </div>

    <!-- Pavé numérique -->
    <div id="numpad" class="grid grid-cols-3 gap-1.5 mb-2">
      <button class="numpad-key" data-digit="1">1</button>
      <button class="numpad-key" data-digit="2">2</button>
      <button class="numpad-key" data-digit="3">3</button>
      
      <button class="numpad-key" data-digit="4">4</button>
      <button class="numpad-key" data-digit="5">5</button>
      <button class="numpad-key" data-digit="6">6</button>
      
      <button class="numpad-key" data-digit="7">7</button>
      <button class="numpad-key" data-digit="8">8</button>
      <button class="numpad-key" data-digit="9">9</button>


      <button id="backspaceBtn"
        class="py-2 rounded-[0.65rem] text-xl font-bold select-none cursor-pointer transition-colors
               bg-red-50 hover:bg-red-100 active:bg-red-200 text-red-400
               dark:bg-red-900/20 dark:hover:bg-red-900/40 dark:text-red-400">⌫</button>
      <button class="numpad-key" data-digit="0">0</button>
      <button id="continueBtn"
        class="continue-hours py-2 rounded-[0.65rem] text-xl font-bold select-none cursor-pointer transition-colors">→</button>
    </div>

    <!-- Résultat -->
    <div id="result" class="hidden text-center font-semibold rounded-xl p-2 mb-2 text-sm"></div>


  </div>

  <!-- Modal Paramètres -->
  <div id="settingsModal"
    class="hidden fixed inset-0 bg-black/30 dark:bg-black/60 flex items-center justify-center p-4 z-10">
    <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-xl p-6 w-full max-w-xs">
      <h2 class="text-lg font-bold text-slate-700 dark:text-slate-100 mb-4">Paramètres</h2>
      <label class="block text-sm text-slate-600 dark:text-slate-300 mb-1">
        Tolérance (minutes pour réponse en jaune)
      </label>
      <input id="toleranceInput" type="number" min="0" max="30" inputmode="numeric"
        class="w-full rounded-xl p-3 text-center text-xl font-bold mb-4
               border-2 border-slate-200 dark:border-slate-600
               bg-white dark:bg-slate-700
               text-slate-800 dark:text-slate-100
               focus:outline-none focus:border-blue-400" />
      <label class="flex items-center gap-3 cursor-pointer mb-5 select-none">
        <div id="toggleTrack"
          class="relative w-10 h-6 rounded-full transition-colors duration-200">
          <div id="toggleThumb"
            class="absolute top-1 left-1 w-4 h-4 rounded-full bg-white shadow transition-transform duration-200"></div>
        </div>
        <span class="text-sm text-slate-600 dark:text-slate-300">Masquer les chiffres</span>
      </label>
      <div class="flex gap-2">
        <button id="saveSettings"
          class="flex-1 bg-blue-500 hover:bg-blue-600 text-white py-3 rounded-xl font-semibold select-none">
          Sauvegarder
        </button>
        <button id="closeSettings"
          class="flex-1 bg-slate-100 hover:bg-slate-200 dark:bg-slate-700 dark:hover:bg-slate-600
                 text-slate-600 dark:text-slate-300 py-3 rounded-xl font-semibold select-none">
          Fermer
        </button>
      </div>
    </div>
  </div>

  <script>
    // ── État ────────────────────────────────────────────────────────────────
    const CX = 110, CY = 110;
    let currentHour   = 12;
    let currentMinute = 0;
    let tolerance   = parseInt(localStorage.getItem('clockTolerance') ?? '3', 10);
    let hideNumbers = localStorage.getItem('clockHideNumbers') === 'true';
    let score       = 0;
    let bestScore   = parseInt(localStorage.getItem('clockBestScore') ?? '0', 10);
    let darkMode    = localStorage.getItem('clockDark') === 'true';

    let activeField  = 'hours';
    let hoursInput   = '';
    let minutesInput = '';
    let numpadLocked = false;

    function updateContinueBtn() {
      const btn = document.getElementById('continueBtn');
      const onMin = activeField === 'minutes';
      btn.textContent = onMin ? '✓' : '→';
      btn.classList.toggle('continue-hours', !onMin);
      btn.classList.toggle('continue-min',   onMin);
    }

    function selectField(field) {
      activeField = field;
      document.getElementById('dispHours').classList.toggle('disp-active', field === 'hours');
      document.getElementById('dispMinutes').classList.toggle('disp-active', field === 'minutes');
      updateContinueBtn();
    }

    function updateNumpadDisplay() {
      const hv = document.getElementById('dispHoursVal');
      const mv = document.getElementById('dispMinutesVal');
      hv.textContent = hoursInput || '--';
      hv.classList.toggle('has-val', hoursInput !== '');
      mv.textContent = minutesInput || '--';
      mv.classList.toggle('has-val', minutesInput !== '');
    }

    function handleDigit(d) {
      if (numpadLocked) return;
      if (activeField === 'hours') {
        if (hoursInput.length < 2) {
          hoursInput += d;
          updateNumpadDisplay();
          if (hoursInput.length === 2) selectField('minutes');
        }
      } else {
        if (minutesInput.length < 2) {
          minutesInput += d;
          updateNumpadDisplay();
        }
      }
    }

    function handleBackspace() {
      if (numpadLocked) return;
      if (activeField === 'minutes' && minutesInput.length === 0) {
        selectField('hours');
        hoursInput = hoursInput.slice(0, -1);
      } else if (activeField === 'minutes') {
        minutesInput = minutesInput.slice(0, -1);
      } else {
        hoursInput = hoursInput.slice(0, -1);
      }
      updateNumpadDisplay();
    }

    let roundStartTime = 0;
    let sessionTimes   = [];
    let bestAvgMs      = parseInt(localStorage.getItem('clockBestAvg') ?? '0', 10);

    function formatTime(ms) {
      if (ms < 60000) return (ms / 1000).toFixed(1) + 's';
      return Math.floor(ms / 60000) + 'm' + String(Math.floor((ms % 60000) / 1000)).padStart(2, '0') + 's';
    }

    // ── Score ───────────────────────────────────────────────────────────────
    function updateScoreUI() {
      document.getElementById('scoreDisplay').textContent = score;
      document.getElementById('bestDisplay').textContent  = bestScore;
    }

    function updateTimerUI() {
      const avg = Math.round(sessionTimes.reduce((a, b) => a + b, 0) / sessionTimes.length);
      document.getElementById('avgDisplay').textContent     = formatTime(avg);
      document.getElementById('bestAvgDisplay').textContent = bestAvgMs > 0 ? formatTime(bestAvgMs) : '—';
    }

    // ── Dark mode ───────────────────────────────────────────────────────────
    function applyDark() {
      document.documentElement.classList.toggle('dark', darkMode);
      document.getElementById('darkBtn').textContent   = darkMode ? '☀️' : '🌙';
      document.getElementById('themeColor').content    = darkMode ? '#0f172a' : '#f1f5f9';
    }

    document.getElementById('darkBtn').addEventListener('click', () => {
      darkMode = !darkMode;
      localStorage.setItem('clockDark', darkMode);
      applyDark();
    });

    // ── Géométrie ───────────────────────────────────────────────────────────
    function clockAngleToXY(angleDeg, radius) {
      const rad = (angleDeg - 90) * Math.PI / 180;
      return { x: CX + Math.cos(rad) * radius, y: CY + Math.sin(rad) * radius };
    }

    // ── Cadran ──────────────────────────────────────────────────────────────
    function drawFace() {
      const NS = 'http://www.w3.org/2000/svg';
      const g  = document.getElementById('clock-marks');
      g.innerHTML = '';

      for (let i = 0; i < 60; i++) {
        const angle  = i * 6;
        const isHour = i % 5 === 0;
        const p1 = clockAngleToXY(angle, isHour ? 88 : 95);
        const p2 = clockAngleToXY(angle, 100);
        const line = document.createElementNS(NS, 'line');
        line.setAttribute('x1', p1.x); line.setAttribute('y1', p1.y);
        line.setAttribute('x2', p2.x); line.setAttribute('y2', p2.y);
        line.setAttribute('stroke',       isHour ? 'var(--clock-mark-h)' : 'var(--clock-mark-m)');
        line.setAttribute('stroke-width', isHour ? '2.5' : '1');
        g.appendChild(line);
      }

      if (hideNumbers) return;
      for (let n = 1; n <= 12; n++) {
        const pos  = clockAngleToXY(n * 30, 76);
        const text = document.createElementNS(NS, 'text');
        text.setAttribute('x',                pos.x);
        text.setAttribute('y',                pos.y);
        text.setAttribute('text-anchor',      'middle');
        text.setAttribute('dominant-baseline','central');
        text.setAttribute('font-size',        '15');
        text.setAttribute('font-weight',      'bold');
        text.setAttribute('font-family',      'system-ui, sans-serif');
        text.setAttribute('fill',             'var(--clock-num)');
        text.textContent = n;
        g.appendChild(text);
      }
    }

    // ── Badge AM/PM ─────────────────────────────────────────────────────────
    function updateAmPm(h) {
      const isPm = h >= 12;
      document.getElementById('ampm-label').textContent = isPm ? 'PM' : 'AM';
      document.getElementById('ampm-bg').setAttribute('fill',    isPm ? '#fde68a' : '#bfdbfe');
      document.getElementById('ampm-label').setAttribute('fill', isPm ? '#92400e' : '#1d4ed8');
    }

    // ── Aiguilles ───────────────────────────────────────────────────────────
    function updateHands(h, m) {
      const hp = clockAngleToXY((h % 12 + m / 60) * 30, 58);
      const mp = clockAngleToXY(m * 6, 84);
      const hh = document.getElementById('hour-hand');
      hh.setAttribute('x2', hp.x); hh.setAttribute('y2', hp.y);
      const mh = document.getElementById('minute-hand');
      mh.setAttribute('x2', mp.x); mh.setAttribute('y2', mp.y);
      updateAmPm(h);
    }

    // ── Nouveau tour ────────────────────────────────────────────────────────
    function newRound() {
      currentHour   = Math.floor(Math.random() * 24);
      currentMinute = Math.floor(Math.random() * 60);
      updateHands(currentHour, currentMinute);

      hoursInput   = '';
      minutesInput = '';
      numpadLocked = false;
      selectField('hours');
      updateNumpadDisplay();
      document.getElementById('numpad').classList.remove('locked');
      updateContinueBtn();

      document.getElementById('result').className = 'hidden';
      document.getElementById('result').textContent = '';

      roundStartTime = Date.now();
    }

    // ── Validation ──────────────────────────────────────────────────────────
    function validate() {
      if (hoursInput === '' || minutesInput === '') return;
      const inputH = parseInt(hoursInput, 10);
      const inputM = parseInt(minutesInput, 10);
      if (inputH < 0 || inputH > 23) return;
      if (inputM < 0 || inputM > 59) return;

      sessionTimes.push(Date.now() - roundStartTime);
      const sessionAvg = Math.round(sessionTimes.reduce((a, b) => a + b, 0) / sessionTimes.length);

      const correctTotal = currentHour * 60 + currentMinute;
      const inputTotal   = inputH      * 60 + inputM;
      let diff = Math.abs(correctTotal - inputTotal);
      diff = Math.min(diff, 1440 - diff);

      const correctStr = `${String(currentHour).padStart(2,'0')}:${String(currentMinute).padStart(2,'0')}`;
      const result = document.getElementById('result');
      result.classList.remove('hidden');

      if (diff === 0) {
        score++;
        if (score > bestScore) { bestScore = score; localStorage.setItem('clockBestScore', bestScore); }
        updateScoreUI();
        if (bestAvgMs === 0 || sessionAvg < bestAvgMs) { bestAvgMs = sessionAvg; localStorage.setItem('clockBestAvg', bestAvgMs); }
        updateTimerUI();
        result.className = 'text-center font-semibold rounded-xl p-3 mb-4 text-base bg-green-100 text-green-700 dark:bg-green-900/40 dark:text-green-300';
        result.textContent = '✓ Exact !';
      } else if (diff <= tolerance) {
        score++;
        if (score > bestScore) { bestScore = score; localStorage.setItem('clockBestScore', bestScore); }
        updateScoreUI();
        if (bestAvgMs === 0 || sessionAvg < bestAvgMs) { bestAvgMs = sessionAvg; localStorage.setItem('clockBestAvg', bestAvgMs); }
        updateTimerUI();
        result.className = 'text-center font-semibold rounded-xl p-3 mb-4 text-base bg-yellow-100 text-yellow-700 dark:bg-yellow-900/40 dark:text-yellow-300';
        result.textContent = `Presque ! Il était ${correctStr}`;
      } else {
        if (bestAvgMs === 0 || sessionAvg < bestAvgMs) { bestAvgMs = sessionAvg; localStorage.setItem('clockBestAvg', bestAvgMs); }
        sessionTimes = [];
        score = 0;
        updateScoreUI();
        document.getElementById('avgDisplay').textContent     = '—';
        document.getElementById('bestAvgDisplay').textContent = bestAvgMs > 0 ? formatTime(bestAvgMs) : '—';
        result.className = 'text-center font-semibold rounded-xl p-3 mb-4 text-base bg-red-100 text-red-700 dark:bg-red-900/40 dark:text-red-300';
        result.textContent = `Raté ! Il était ${correctStr}`;
      }

      numpadLocked = true;
      document.getElementById('numpad').classList.add('locked');
      const cb = document.getElementById('continueBtn');
      cb.textContent = '→';
      cb.classList.remove('continue-hours', 'continue-min');
      cb.classList.add('continue-next');
    }

    // ── Toggle masquer chiffres ──────────────────────────────────────────────
    function applyToggleUI() {
      document.getElementById('toggleTrack').classList.toggle('tog-on', hideNumbers);
      document.getElementById('toggleThumb').style.transform = hideNumbers ? 'translateX(16px)' : 'translateX(0)';
    }

    // ── Événements ──────────────────────────────────────────────────────────
    document.getElementById('continueBtn').addEventListener('click', () => {
      if (numpadLocked) { newRound(); return; }
      if (activeField === 'hours') selectField('minutes');
      else validate();
    });
    document.querySelectorAll('.numpad-key').forEach(btn =>
      btn.addEventListener('click', () => handleDigit(btn.dataset.digit))
    );
    document.getElementById('backspaceBtn').addEventListener('click', handleBackspace);
    document.getElementById('dispHours').addEventListener('click', () => { if (!numpadLocked) selectField('hours'); });
    document.getElementById('dispMinutes').addEventListener('click', () => { if (!numpadLocked) selectField('minutes'); });

    // Support clavier physique (desktop)
    document.addEventListener('keydown', e => {
      if (e.key >= '0' && e.key <= '9') handleDigit(e.key);
      else if (e.key === 'Backspace') { e.preventDefault(); handleBackspace(); }
      else if (e.key === 'Enter') validate();
    });

    document.getElementById('toggleTrack').addEventListener('click', () => {
      hideNumbers = !hideNumbers;
      applyToggleUI();
    });

    document.getElementById('settingsBtn').addEventListener('click', () => {
      document.getElementById('toleranceInput').value = tolerance;
      applyToggleUI();
      document.getElementById('settingsModal').classList.remove('hidden');
    });

    document.getElementById('closeSettings').addEventListener('click', () =>
      document.getElementById('settingsModal').classList.add('hidden')
    );

    document.getElementById('settingsModal').addEventListener('click', e => {
      if (e.target === document.getElementById('settingsModal'))
        document.getElementById('settingsModal').classList.add('hidden');
    });

    document.getElementById('saveSettings').addEventListener('click', () => {
      const v = parseInt(document.getElementById('toleranceInput').value, 10);
      if (!isNaN(v) && v >= 0) { tolerance = v; localStorage.setItem('clockTolerance', tolerance); }
      localStorage.setItem('clockHideNumbers', hideNumbers);
      drawFace();
      document.getElementById('settingsModal').classList.add('hidden');
    });

    // ── Init ────────────────────────────────────────────────────────────────
    applyDark();
    updateScoreUI();
    if (bestAvgMs > 0) document.getElementById('bestAvgDisplay').textContent = formatTime(bestAvgMs);
    drawFace();
    newRound();
  </script>
</body>
</html>
